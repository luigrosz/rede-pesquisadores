services:
  projeto-farmacia-frontend:
    build:
      context: ./frontend
      network: host
      args:
        VITE_API_URL: ${API_URL:-http://localhost:3000}
    ports:
      - "80:80"
    restart: always
    depends_on:
      projeto-farmacia-backend:
        condition: service_healthy

  projeto-farmacia-backend:
    build:
      context: ./backend
      network: host
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@projeto-farmacia-db:5432/${POSTGRES_DB}
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      projeto-farmacia-db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  projeto-farmacia-db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db-init:/docker-entrypoint-initdb.d
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  projeto-farmacia-backup:
    image: prodrigestivill/postgres-backup-local
    restart: always
    volumes:
      - ./backups:/backups
    depends_on:
      projeto-farmacia-db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=projeto-farmacia-db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
    env_file:
      - ./backend/.env

volumes:
  postgres_data:
